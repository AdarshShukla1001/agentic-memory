version: '3.8'

services:
  backend:
    build: ./backend
    container_name: agentic-memory-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/memories.db:/app/memories.db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agentic-memory-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
